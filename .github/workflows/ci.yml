name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: python -m pip install ruff
      - name: Lint
        run: ruff check src/ tests/ benchmarks/
      - name: Format check
        run: ruff format --check src/ tests/ benchmarks/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package with dev dependencies
        run: python -m pip install -e ".[dev]"
      - name: Run tests with coverage (gate set in pyproject)
        run: python -m pytest tests/ --cov --cov-report=term-missing
      - name: Run proof-skeleton demo (small)
        run: matousek-demo 400 42
      - name: Run practical tree demo
        run: practical-tree examples/points_example.csv --r 4 --leaf-size 2 --halfplane 1 0 -5
